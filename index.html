<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>마스터 오목: 리얼 사운드 에디션</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
  body { margin: 0; background: #e9d6a7; font-family: 'Pretendard', system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
  #startModal, #resultModal, #historyModal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.6); z-index: 9999; }
  #resultModal, #historyModal { display: none; z-index: 10000; }
  .box { background: #fff; width: 340px; padding: 25px; border-radius: 22px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); text-align: center; position: relative; }
  .title { font-weight: 800; font-size: 1.3rem; margin-bottom: 15px; }
  .btn { width: 100%; padding: 12px; margin: 5px 0; border-radius: 12px; border: 1px solid #eee; background: #f9f9f9; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px; }
  .btn.active { background: #2f6fed; color: #fff; border: none; }
  .btn.sub { background: #555; color: #fff; border: none; margin-top: 10px; }
  
  #levelContainer { position: relative; margin-top: 10px; border-radius: 12px; overflow: hidden; }
  #levelOverlay { position: absolute; inset: 0; background: rgba(200, 200, 200, 0.6); display: none; z-index: 10; cursor: not-allowed; }

  .wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 15px; }
  canvas { background: linear-gradient(135deg,#d8a45d,#c8924a); border: 4px solid #4a3419; border-radius: 12px; cursor: pointer; }
  
  .info-bar { display: flex; gap: 15px; margin-bottom: 5px; align-items: center; }
  .timer-box { background: rgba(0,0,0,0.8); color: #fff; padding: 8px 12px; border-radius: 15px; font-family: monospace; font-size: 16px; min-width: 70px; text-align: center; border: 2px solid transparent; }
  .timer-box.active { border-color: #2f6fed; box-shadow: 0 0 10px #2f6fed; transform: scale(1.05); }
  .status { background: #333; color: #fff; padding: 8px 15px; border-radius: 20px; font-size: 13px; font-weight: bold; min-width: 150px; text-align: center; }
  
  .control-panel { display: flex; gap: 10px; width: 100%; margin-top: 5px; }
  .sound-toggle { position: absolute; top: 20px; right: 20px; font-size: 20px; cursor: pointer; background: white; border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  
  .history-item { background: #f0f0f0; padding: 10px; border-radius: 10px; margin-bottom: 8px; text-align: left; font-size: 12px; position: relative; }
  .history-del { position: absolute; right: 10px; top: 10px; color: #e74c3c; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div id="startModal">
  <div class="box">
    <div class="sound-toggle" id="soundToggleStart" onclick="toggleSound()">🔊</div>
    <div class="title">오목 마스터</div>
    <button class="btn active" id="aiBtn" onclick="selectMode('ai')">AI 대전</button>
    <button class="btn" id="friendBtn" onclick="selectMode('friend')">친구 대전</button>
    <div id="levelContainer">
        <div id="levelOverlay"></div>
        <div style="height:1px; background:#eee; margin:10px 0;"></div>
        <div id="levelBox">
          <button class="btn active" id="easyBtn" onclick="setLevel('easy')">초보</button>
          <button class="btn" id="midBtn" onclick="setLevel('medium')">중수</button>
          <button class="btn" id="hardBtn" onclick="setLevel('hard')">고수</button>
        </div>
    </div>
    <button class="btn sub" onclick="showHistory()">최근 기보 보기</button>
    <button class="btn active" style="background:#333; margin-top:15px;" onclick="startGame()">게임 시작</button>
  </div>
</div>

<div id="historyModal">
  <div class="box">
    <div class="title">최근 기보</div>
    <div id="historyList"></div>
    <button class="btn active" onclick="closeHistory()">닫기</button>
  </div>
</div>

<div id="resultModal">
  <div class="box">
    <div class="title">게임 종료</div>
    <div id="resultContent" style="margin-bottom:20px; font-size:1.1rem;"></div>
    <button class="btn active" onclick="location.reload()">다시 하기</button>
  </div>
</div>

<div class="wrapper">
  <div class="sound-toggle" style="position:fixed; top:20px; right:20px;" id="soundToggleGame" onclick="toggleSound()">🔊</div>
  <div class="info-bar">
    <div id="timer1" class="timer-box">00:00</div>
    <div id="status" class="status">흑 차례</div>
    <div id="timer2" class="timer-box">00:00</div>
  </div>
  <canvas id="c" width="600" height="600"></canvas>
  <div class="control-panel">
      <button class="btn" style="flex:1; margin:0;" onclick="undo()">무르기</button>
      <button class="btn" style="flex:1; margin:0;" onclick="location.reload()">항복/재시작</button>
  </div>
</div>

<script>
let mode = "ai", level = "easy", board = [], turn = 1, isGameOver = false, lastMove = null;
let timers = [0, 0], timerInterval;
let moveHistory = [];
let soundEnabled = true;
const SIZE = 15, c = document.getElementById("c"), ctx = c.getContext("2d"), cell = c.width / (SIZE + 1);

// 리얼 오목 사운드 합성기
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playStoneSound() {
  if(!soundEnabled) return;
  if(audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;
  
  // 1. 타격음 (어택)
  const osc1 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  osc1.type = 'triangle';
  osc1.frequency.setValueAtTime(150, now);
  osc1.frequency.exponentialRampToValueAtTime(40, now + 0.1);
  gain1.gain.setValueAtTime(0.5, now);
  gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
  osc1.connect(gain1);
  gain1.connect(audioCtx.destination);

  // 2. 나무판 공명음 (고음역 클릭)
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(800, now);
  osc2.frequency.exponentialRampToValueAtTime(600, now + 0.05);
  gain2.gain.setValueAtTime(0.2, now);
  gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);

  osc1.start(); osc1.stop(now + 0.1);
  osc2.start(); osc2.stop(now + 0.05);
}

function toggleSound() {
    soundEnabled = !soundEnabled;
    const icon = soundEnabled ? "🔊" : "🔇";
    document.getElementById("soundToggleStart").innerText = icon;
    document.getElementById("soundToggleGame").innerText = icon;
}

function selectMode(m) {
  mode = m;
  document.getElementById("aiBtn").classList.toggle("active", m==='ai');
  document.getElementById("friendBtn").classList.toggle("active", m==='friend');
  document.getElementById("levelOverlay").style.display = (m === 'friend') ? "block" : "none";
}

function setLevel(l) {
  if(mode !== 'ai') return;
  level = l;
  document.querySelectorAll("#levelBox .btn").forEach(b => b.classList.remove("active"));
  document.getElementById(l === 'medium' ? 'midBtn' : l + 'Btn').classList.add("active");
}

function startGame() {
  board = Array.from({length:SIZE},()=>Array(SIZE).fill(0));
  timers = [0, 0]; moveHistory = []; isGameOver = false; turn = 1;
  document.getElementById("startModal").style.display = "none";
  clearInterval(timerInterval);
  timerInterval = setInterval(() => { timers[turn-1]++; updateTimerUI(); }, 1000);
  draw();
}

function updateTimerUI() {
  for(let i=0; i<2; i++) {
    let m = Math.floor(timers[i]/60), s = timers[i]%60;
    document.getElementById(`timer${i+1}`).innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    document.getElementById(`timer${i+1}`).classList.toggle("active", turn === i+1);
  }
}

function draw() {
  ctx.clearRect(0,0,c.width,c.height);
  ctx.strokeStyle="#4a3419"; ctx.lineWidth=1;
  for(let i=1;i<=SIZE;i++){
    ctx.beginPath(); ctx.moveTo(cell,i*cell); ctx.lineTo(SIZE*cell,i*cell); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(i*cell,cell); ctx.lineTo(i*cell,SIZE*cell); ctx.stroke();
  }
  [4,8,12].forEach(y=>[4,8,12].forEach(x=>{
    ctx.beginPath(); ctx.arc(x*cell,y*cell,4,0,Math.PI*2); ctx.fillStyle="#4a3419"; ctx.fill();
  }));
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++) if(board[y][x]) drawStone(x,y,board[y][x]);
  if(lastMove){ ctx.fillStyle="#ff4d4d"; ctx.beginPath(); ctx.arc((lastMove.x+1)*cell,(lastMove.y+1)*cell,5,0,Math.PI*2); ctx.fill(); }
}

function drawStone(x,y,p) {
  const px=(x+1)*cell, py=(y+1)*cell;
  const grad=ctx.createRadialGradient(px-cell*0.15, py-cell*0.15, cell*0.05, px, py, cell*0.4);
  if(p===1){ grad.addColorStop(0,"#666"); grad.addColorStop(1,"#000"); }
  else { grad.addColorStop(0,"#fff"); grad.addColorStop(1,"#ccc"); }
  ctx.beginPath(); ctx.arc(px,py,cell*0.42,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();
  if(p===2){ ctx.strokeStyle="#bbb"; ctx.stroke(); }
}

c.onclick=(e)=>{
  if(isGameOver || (mode==="ai" && turn===2)) return;
  const rect=c.getBoundingClientRect(), x=Math.round((e.clientX-rect.left)/cell)-1, y=Math.round((e.clientY-rect.top)/cell)-1;
  if(x>=0 && x<SIZE && y>=0 && y<SIZE && board[y][x]===0){
    if(turn === 1 && isForbidden(x, y)) { document.getElementById("status").innerText = "⚠️ 금수(3-3) 위치!"; return; }
    placeStone(x,y);
  }
};

function placeStone(x,y){
  playStoneSound();
  board[y][x]=turn; 
  lastMove={x,y}; 
  moveHistory.push({x, y, p: turn});
  draw();
  
  if(checkWin(x,y,turn)){ setTimeout(() => endGame(turn), 50); return; }
  turn=3-turn;
  
  if(mode === "ai" && turn === 2) {
    document.getElementById("status").innerText = "백 차례 (AI 생각 중...)";
    setTimeout(aiMove, Math.floor(Math.random() * 501) + 500);
  } else {
    document.getElementById("status").innerText = turn === 1 ? "흑 차례" : "백 차례";
  }
  updateTimerUI();
}

function undo() {
    if(moveHistory.length === 0 || isGameOver) return;
    let steps = (mode === "ai" && turn === 1) ? 2 : 1;
    for(let i=0; i<steps; i++) {
        let last = moveHistory.pop();
        if(last) board[last.y][last.x] = 0;
    }
    lastMove = moveHistory.length > 0 ? moveHistory[moveHistory.length - 1] : null;
    if(mode !== "ai" || steps === 1) turn = 3 - turn;
    document.getElementById("status").innerText = turn === 1 ? "흑 차례" : "백 차례";
    draw();
}

function checkWin(x, y, t) {
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for (let [dx, dy] of dirs) {
    let count = 1;
    for (let i=1; i<6; i++) if (board[y+dy*i]?.[x+dx*i] === t) count++; else break;
    for (let i=1; i<6; i++) if (board[y-dy*i]?.[x-dx*i] === t) count++; else break;
    if (t === 1 && count === 5) return true;
    if (t === 2 && count >= 5) return true;
  }
  return false;
}

function isForbidden(x, y) {
  board[y][x] = 1;
  let openThrees = 0;
  const dirs = [[1,0],[0,1],[1,1],[1,-1]];
  for(let [dx,dy] of dirs) {
    let count = 1;
    for(let i=1;i<7;i++) if(board[y+dy*i]?.[x+dx*i]===1) count++; else break;
    for(let i=1;i<7;i++) if(board[y-dy*i]?.[x-dx*i]===1) count++; else break;
    if(count > 5) { board[y][x]=0; return true; }
  }
  for(let [dx,dy] of dirs) if (checkOpenThree(x, y, dx, dy)) openThrees++;
  board[y][x] = 0;
  return openThrees >= 2;
}

function checkOpenThree(x, y, dx, dy) {
  for (let i = -4; i <= 0; i++) {
    let segment = [];
    for (let j = 0; j < 6; j++) {
      let nx = x + (i + j) * dx, ny = y + (i + j) * dy;
      if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) segment.push(board[ny][nx]);
      else segment.push(-1);
    }
    let s = segment.join("");
    if (s === "011100" || s === "001110" || s === "010110" || s === "011010") return true;
  }
  return false;
}

function endGame(winner) {
  isGameOver = true; clearInterval(timerInterval);
  saveHistory(winner);
  const content = document.getElementById("resultContent");
  if(mode === "ai") {
    if(winner === 1) {
      content.innerHTML = `<span class="win-text">🎉 승리하셨습니다!</span>`;
      confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
    } else {
      content.innerHTML = `<span class="lose-text">패배하셨습니다.</span>`;
    }
  } else {
    content.innerHTML = `<span>${winner===1?'흑돌':'백돌'} 승리!</span>`;
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
  }
  document.getElementById("resultModal").style.display = "flex";
}

function saveHistory(winner) {
    let history = JSON.parse(localStorage.getItem("omok_history") || "[]");
    let result = { id: Date.now(), date: new Date().toLocaleString(), winner: winner === 1 ? '흑' : '백', mode: mode === 'ai' ? 'AI' : '친구', moves: moveHistory.length };
    history.unshift(result);
    if(history.length > 3) history = history.slice(0, 3);
    localStorage.setItem("omok_history", JSON.stringify(history));
}

function showHistory() {
    let history = JSON.parse(localStorage.getItem("omok_history") || "[]");
    let list = document.getElementById("historyList");
    list.innerHTML = history.length ? "" : "<p style='font-size:13px; color:#999;'>기보가 없습니다.</p>";
    history.forEach(item => {
        list.innerHTML += `<div class="history-item"><strong>${item.date}</strong><br>결과: ${item.winner} 승 (${item.mode}) / ${item.moves}수<span class="history-del" onclick="deleteHistory(${item.id})">삭제</span></div>`;
    });
    document.getElementById("historyModal").style.display = "flex";
}

function deleteHistory(id) {
    let history = JSON.parse(localStorage.getItem("omok_history") || "[]");
    history = history.filter(item => item.id !== id);
    localStorage.setItem("omok_history", JSON.stringify(history));
    showHistory();
}

function closeHistory() { document.getElementById("historyModal").style.display = "none"; }

function aiMove() {
  if(isGameOver) return;
  let best = { x: -1, y: -1, score: -1 };
  let rand = level==='easy'?0.7:(level==='medium'?0.2:0);
  for (let y=0; y<SIZE; y++) for (let x=0; x<SIZE; x++) {
    if (board[y][x]===0) {
      let s = (getScore(x,y,2)*1.2) + getScore(x,y,1);
      if (Math.random()<rand) s*=Math.random();
      if (s>best.score) { best={x,y,score:s}; }
    }
  }
  if(best.x!==-1) placeStone(best.x, best.y);
}

function getScore(x,y,t) {
  let s=0; const dirs=[[1,0],[0,1],[1,1],[1,-1]];
  for(let [dx,dy] of dirs){
    let c=0, b=0;
    for(let i=1;i<5;i++){ let v=board[y+dy*i]?.[x+dx*i]; if(v===t) c++; else { if(v!==0) b++; break; } }
    for(let i=1;i<5;i++){ let v=board[y-dy*i]?.[x-dx*i]; if(v===t) c++; else { if(v!==0) b++; break; } }
    if(c>=4) s+=10000; else if(c===3 && b===0) s+=1000; else if(c===3 && b===1) s+=400;
  }
  return s;
}
</script>
</body>
</html>
