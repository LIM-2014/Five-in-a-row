<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>오목 마스터: 렌주룰</title>
    <style>
        :root {
            --bg: #e9d6a7;
            --primary: #2f6fed;
            --dark: #333;
            --impossible: #8e44ad;
        }

        body {
            margin: 0; background: var(--bg);
            font-family: 'Pretendard', sans-serif;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; min-height: 100dvh; touch-action: none;
        }

        .wrapper { position: relative; width: 100%; max-width: 600px; padding: 15px; }

        canvas {
            background: #d8a45d; border: 4px solid #4a3419;
            border-radius: 12px; width: 100%; height: auto; aspect-ratio: 1/1;
        }

        .box {
            background: #fff; padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center;
        }

        .btn {
            width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px;
            border: none; cursor: pointer; font-weight: bold; transition: 0.2s;
        }

        .btn.active { background: var(--primary); color: #fff; }

        #startModal {
            position: fixed; inset: 0; display: flex; align-items: center;
            justify-content: center; background: rgba(0,0,0,0.7); z-index: 1000;
        }

        .status {
            background: var(--dark); color: white; padding: 10px;
            border-radius: 20px; text-align: center; margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div id="startModal">
    <div class="box">
        <h2>오목 마스터</h2>
        <div style="display: flex; gap: 5px; margin-bottom: 10px;">
            <button class="btn active" onclick="mode='ai'">AI 대전</button>
            <button class="btn" onclick="mode='friend'">친구 대전</button>
        </div>
        <button class="btn active" style="background:#333;" onclick="startGame()">게임 시작</button>
    </div>
</div>

<div class="wrapper">
    <div id="status" class="status">대기 중</div>
    <canvas id="c" width="600" height="600"></canvas>
    <button class="btn" style="margin-top:10px; background:#fff;" onclick="undo()">무르기</button>
</div>

<script>
    let mode = "ai", level = "hard", board = [], turn = 1, isGameOver = false, lastMove = null;
    const SIZE = 15, c = document.getElementById("c"), ctx = c.getContext("2d"), cell = 600 / 16;
    let moveHistory = [];

    function initBoard() {
        board = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
    }

    // --- 렌주룰 엔진 (보정된 핵심 로직) ---
    function checkRenjuForbidden(x, y, t) {
        if (t !== 1) return false; // 백은 금수 없음
        if (checkWinStrict(x, y, 1)) return false; // 5목 완성은 금수보다 우선함

        board[y][x] = 1; // 가상 착수
        const ds = [[1, 0], [0, 1], [1, 1], [1, -1]];
        
        let fourCount = 0, openThreeCount = 0;

        for (let [dx, dy] of ds) {
            // 장륙 금수 체크
            let count = 1;
            for (let i = 1; i < 10; i++) if (board[y + dy * i]?.[x + dx * i] === 1) count++; else break;
            for (let i = 1; i < 10; i++) if (board[y - dy * i]?.[x - dx * i] === 1) count++; else break;
            if (count > 5) { board[y][x] = 0; return "장륙 금수"; }

            // 44 및 33 카운트
            if (isRealFour(x, y, dx, dy, 1)) fourCount++;
            if (isRealOpenThree(x, y, dx, dy, 1)) openThreeCount++;
        }
        
        board[y][x] = 0; // 원상 복구
        if (fourCount >= 2) return "44 금수";
        if (openThreeCount >= 2) return "33 금수";
        return false;
    }
    // --- 렌주룰 세부 판정 로직 ---
    function isRealFour(x, y, dx, dy, t) {
        let count = 0;
        for (let i = -4; i <= 4; i++) {
            let nx = x + dx * i, ny = y + dy * i;
            if (board[ny]?.[nx] === 0 || (nx === x && ny === y)) {
                let temp = board[ny][nx]; board[ny][nx] = t;
                if (checkWinStrict(nx, ny, t)) count++;
                board[ny][nx] = temp;
            }
        }
        return count > 0;
    }

    function isOpenFour(x, y, dx, dy, t) {
        let count = 1, leftIdx = 0, rightIdx = 0;
        for (let i = 1; i < 5; i++) if (board[y + dy * i]?.[x + dx * i] === t) count++; else { leftIdx = i; break; }
        for (let i = 1; i < 5; i++) if (board[y - dy * i]?.[x - dx * i] === t) count++; else { rightIdx = i; break; }
        
        if (count === 4) {
            let p1 = { x: x + dx * leftIdx, y: y + dy * leftIdx };
            let p2 = { x: x - dx * rightIdx, y: y - dy * rightIdx };
            let canLeft = (board[p1.y]?.[p1.x] === 0);
            let canRight = (board[p2.y]?.[p2.x] === 0);

            if (t === 1) { // 흑일 경우 금수 자리인지 추가 체크
                if (canLeft && checkRenjuForbidden(p1.x, p1.y, 1)) canLeft = false;
                if (canRight && checkRenjuForbidden(p2.x, p2.y, 1)) canRight = false;
            }
            return canLeft && canRight;
        }
        return false;
    }

    function isRealOpenThree(x, y, dx, dy, t) {
        let success = false;
        for (let i = -4; i <= 4; i++) {
            let nx = x + dx * i, ny = y + dy * i;
            if (nx === x && ny === y || board[ny]?.[nx] !== 0) continue;
            board[ny][nx] = t;
            if (isOpenFour(nx, ny, dx, dy, t)) {
                if (t !== 1 || !checkRenjuForbidden(nx, ny, 1)) success = true;
            }
            board[ny][nx] = 0;
            if (success) break;
        }
        return success;
    }

    function checkWinStrict(x, y, t) {
        const ds = [[1,0],[0,1],[1,1],[1,-1]];
        for(let [dx, dy] of ds) {
            let count = 1;
            for(let i=1; i<6; i++) if(board[y+dy*i]?.[x+dx*i]===t) count++; else break;
            for(let i=1; i<6; i++) if(board[y-dy*i]?.[x-dx*i]===t) count++; else break;
            if (t === 1 && count === 5) return true; // 흑은 정확히 5목만 승리
            if (t === 2 && count >= 5) return true;  // 백은 5목 이상(장륙 포함) 승리
        }
        return false;
    }

    // --- 게임 운영 및 AI 로직 ---
    function draw() {
        ctx.clearRect(0, 0, 600, 600);
        ctx.strokeStyle = "#4a3419";
        for (let i = 1; i <= SIZE; i++) {
            ctx.beginPath(); ctx.moveTo(cell * i, cell); ctx.lineTo(cell * i, cell * SIZE); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(cell, cell * i); ctx.lineTo(cell * SIZE, cell * i); ctx.stroke();
        }
        for (let y = 0; y < SIZE; y++) {
            for (let x = 0; x < SIZE; x++) {
                if (board[y][x] > 0) {
                    ctx.beginPath();
                    ctx.arc(cell * (x + 1), cell * (y + 1), cell * 0.4, 0, Math.PI * 2);
                    ctx.fillStyle = board[y][x] === 1 ? "#000" : "#fff";
                    ctx.fill();
                    if (lastMove && lastMove.x === x && lastMove.y === y) {
                        ctx.strokeStyle = "red"; ctx.lineWidth = 2; ctx.stroke();
                    }
                }
            }
        }
    }

    function placeStone(x, y) {
        if (isGameOver || board[y][x] !== 0) return;
        board[y][x] = turn;
        lastMove = { x, y };
        moveHistory.push({ x, y, p: turn });
        draw();

        if (checkWinStrict(x, y, turn)) {
            isGameOver = true;
            setTimeout(() => alert((turn === 1 ? "흑" : "백") + " 승리!"), 100);
            document.getElementById("startModal").style.display = "flex";
            return;
        }
        turn = 3 - turn;
        updateStatus((turn === 1 ? "흑" : "백") + "의 차례");
        if (mode === "ai" && turn === 2) triggerAi();
    }

    function triggerAi() {
        setTimeout(() => {
            let best = { x: -1, y: -1 }, maxS = -1;
            for (let y = 0; y < SIZE; y++) {
                for (let x = 0; x < SIZE; x++) {
                    if (board[y][x] === 0) {
                        let s = Math.random() * 10; // 단순 예시용 가중치
                        if (s > maxS) { maxS = s; best = { x, y }; }
                    }
                }
            }
            placeStone(best.x, best.y);
        }, 600);
    }

    function handleInput(e) {
        if (isGameOver || (mode === "ai" && turn === 2)) return;
        const rect = c.getBoundingClientRect();
        const cX = e.touches ? e.touches[0].clientX : e.clientX;
        const cY = e.touches ? e.touches[0].clientY : e.clientY;
        const scale = 600 / rect.width;
        const x = Math.round(((cX - rect.left) * scale) / cell) - 1;
        const y = Math.round(((cY - rect.top) * scale) / cell) - 1;
        
        if (x >= 0 && x < SIZE && y >= 0 && y < SIZE && board[y][x] === 0) {
            const forbidden = checkRenjuForbidden(x, y, turn);
            if (forbidden) { updateStatus(`⚠️ ${forbidden}`, true); return; }
            placeStone(x, y);
        }
    }

    function startGame() {
        initBoard();
        turn = 1; isGameOver = false; lastMove = null; moveHistory = [];
        document.getElementById("startModal").style.display = "none";
        updateStatus("흑의 차례 (게임 시작)");
        draw();
    }

    function updateStatus(msg) { document.getElementById("status").innerText = msg; }
    function undo() { if(moveHistory.length > 0) { let l = moveHistory.pop(); board[l.y][l.x] = 0; turn = l.p; draw(); } }

    c.addEventListener('mousedown', handleInput);
    c.addEventListener('touchstart', (e) => { e.preventDefault(); handleInput(e); }, { passive: false });
</script>
</body>
</html>
